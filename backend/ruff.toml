[tool.ruff]
target-version = "py311"
line-length = 100
exclude = [
    "migrations",
    "__pycache__",
    ".venv",
    "venv",
]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
]
ignore = [
    "E501",  # line too long — handled by formatter
    "B008",  # do not perform function calls in default arguments (common in Django)
    "B904",  # within an except clause, raise from error
]

[tool.ruff.lint.isort]
known-first-party = ["scrum_agent"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
